<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHM Simulation - Toggle Control</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --dial-color: #f2f2f2;
            --indicator-color: #007bff;
            --run-color: #28a745;
            --pause-color: #dc3545;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            background: #ffffff;
            width: 100%;
            height: 38vh;
            display: block;
        }

        .ui-wrapper {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid #eee;
            padding-top: 5px;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(17, 1fr);
            width: 100%;
            box-sizing: border-box;
        }

        .column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 5px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 800;
            margin: 12px 0 6px 0;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Amplitude Sliders */
        input[type=range].vertical {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 10px;
            height: 90px;
            cursor: pointer;
        }

        /* Phase Dials */
        .dial-container {
            width: 38px;
            height: 38px;
            position: relative;
            cursor: ns-resize;
            user-select: none;
        }

        .dial-svg {
            width: 100%;
            height: 100%;
            transition: transform 0.1s ease-out;
        }

        .dial-circle { fill: var(--dial-color); stroke: #ccc; stroke-width: 2; }
        .dial-indicator { stroke: var(--indicator-color); stroke-width: 4; stroke-linecap: round; }

        .particle-num {
            font-size: 10px;
            font-weight: bold;
            color: #444;
            margin-top: 2px;
        }

        /* Footer Controls */
        .footer-controls {
            margin-top: auto;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }

        button, .file-btn {
            padding: 10px 18px;
            border: 2px solid #333;
            background: white;
            color: #333;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            font-size: 12px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button:hover, .file-btn:hover { background: #333; color: white; }
        
        /* Combined Run/Pause Button Styling */
        #toggle-btn {
            min-width: 100px;
            border-color: var(--run-color);
            color: var(--run-color);
        }
        #toggle-btn.running {
            border-color: var(--pause-color);
            color: var(--pause-color);
        }
        #toggle-btn.running:hover { background: var(--pause-color); color: white; }
        #toggle-btn:not(.running):hover { background: var(--run-color); color: white; }

        .cheat-btn { background: #6f42c1; color: white; border-color: #6f42c1; }
        .cheat-btn:hover { background: #5a32a3; }
        
        #batch-upload-btn { background: #007bff; color: white; border-color: #007bff; }
        #batch-upload-btn:hover { background: #0056b3; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <canvas id="simCanvas"></canvas>

    <div class="ui-wrapper">
        <div class="section-title">Amplitude</div>
        <div class="control-grid" id="amp-grid"></div>

        <div class="section-title">Phase (Drag Up/Down)</div>
        <div class="control-grid" id="phase-grid"></div>

        <div class="footer-controls">
            <label class="file-btn" id="batch-upload-btn">
                Select 17 Image Files
                <input type="file" id="batchInput" multiple accept="image/*">
            </label>
            <button id="toggle-btn">Run</button>
            <button id="cheat-standing" class="cheat-btn">Cheat: Standing</button>
            <button id="cheat-progressive" class="cheat-btn">Cheat: Progressive</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const batchInput = document.getElementById('batchInput');
        const toggleBtn = document.getElementById('toggle-btn');
        
        const numParticles = 17;
        let particles = [];
        let time = 0;
        let isPaused = true; // Paused at the beginning

        let ampSliders = [];
        let phaseDials = [];

        function init() {
            resize();
            const ampGrid = document.getElementById('amp-grid');
            const phaseGrid = document.getElementById('phase-grid');

            for (let i = 0; i < numParticles; i++) {
                particles.push({ amplitude: 50, phase: 0, img: null });

                // Amplitude Sliders
                const ampCol = document.createElement('div');
                ampCol.className = 'column';
                const ampS = document.createElement('input');
                ampS.type = 'range'; ampS.className = 'vertical';
                ampS.min = 0; ampS.max = 140; ampS.value = 50;
                ampS.oninput = (e) => particles[i].amplitude = parseFloat(e.target.value);
                ampCol.appendChild(ampS);
                ampGrid.appendChild(ampCol);
                ampSliders.push(ampS);

                // Phase Dials
                const phaseCol = document.createElement('div');
                phaseCol.className = 'column';
                const dialCont = document.createElement('div');
                dialCont.className = 'dial-container';
                dialCont.innerHTML = `
                    <svg class="dial-svg" viewBox="0 0 40 40">
                        <circle class="dial-circle" cx="20" cy="20" r="18" />
                        <line class="dial-indicator" x1="20" y1="20" x2="20" y2="5" />
                    </svg>
                    <div class="particle-num">${i+1}</div>
                `;
                setupDialInteraction(dialCont, i, 0);
                phaseCol.appendChild(dialCont);
                phaseGrid.appendChild(phaseCol);
                phaseDials.push(dialCont.querySelector('.dial-svg'));
            }
        }

        // --- Toggle logic ---
        toggleBtn.onclick = () => {
            isPaused = !isPaused;
            if (isPaused) {
                toggleBtn.innerText = "Run";
                toggleBtn.classList.remove("running");
            } else {
                toggleBtn.innerText = "Pause";
                toggleBtn.classList.add("running");
            }
        };

        // --- Batch upload ---
        batchInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));

            files.forEach((file, index) => {
                if (index < numParticles) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => { particles[index].img = img; };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        };

        function updateDialVisual(index, rad) {
            const deg = (rad / (Math.PI * 2)) * 360;
            phaseDials[index].style.transform = `rotate(${deg}deg)`;
        }

        function setupDialInteraction(el, index, initialValue) {
            let startY;
            let startPhase = initialValue;
            el.addEventListener('mousedown', (e) => {
                startY = e.clientY;
                const onMouseMove = (me) => {
                    let newPhase = startPhase + ((startY - me.clientY) / 100) * Math.PI;
                    particles[index].phase = newPhase;
                    updateDialVisual(index, newPhase);
                };
                const onMouseUp = () => {
                    startPhase = particles[index].phase;
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                };
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
            });
        }

        document.getElementById('cheat-standing').onclick = () => {
            for (let i = 0; i < numParticles; i++) {
                let waveFactor = Math.sin((4 * Math.PI * i) / (numParticles - 1));
                particles[i].amplitude = Math.abs(waveFactor) * 110;
                particles[i].phase = waveFactor >= 0 ? 0 : Math.PI;
                ampSliders[i].value = particles[i].amplitude;
                updateDialVisual(i, particles[i].phase);
            }
        };

        document.getElementById('cheat-progressive').onclick = () => {
            const phaseStep = (2 * Math.PI) / 8;
            for (let i = 0; i < numParticles; i++) {
                particles[i].amplitude = 60; 
                particles[i].phase = -i * phaseStep; 
                ampSliders[i].value = 60;
                updateDialVisual(i, particles[i].phase);
            }
        };

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = (window.innerHeight * 0.38) * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        function draw() {
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            const centerY = h / 2;
            const laneWidth = w / numParticles;

            ctx.clearRect(0, 0, w, h);
            
            ctx.beginPath();
            ctx.strokeStyle = '#f0f0f0';
            ctx.moveTo(0, centerY); ctx.lineTo(w, centerY);
            ctx.stroke();

            particles.forEach((p, i) => {
                const x = (i + 0.5) * laneWidth;
                const y = centerY + p.amplitude * Math.sin(time + p.phase);

                if (p.img) {
                    const s = 50;
                    ctx.drawImage(p.img, x - s/2, y - s/2, s, s);
                } else {
                    ctx.beginPath(); ctx.arc(x, y, 15, 0, Math.PI * 2);
                    ctx.fillStyle = "#ddd"; ctx.fill();
                    ctx.fillStyle = "#999"; ctx.font = "bold 10px sans-serif";
                    ctx.textAlign = "center"; ctx.fillText(i+1, x, y + 4);
                }
            });

            if (!isPaused) time += 0.06;
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        init();
        draw();
    </script>
</body>
</html>
