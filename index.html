<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHM Simulations Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 40px;
            border: 1px solid #eee;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            color: #888;
            margin-bottom: 40px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sim-link {
            text-decoration: none;
            padding: 20px;
            background-color: #ffffff;
            color: #333;
            border: 2px solid #333;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sim-link:hover {
            background-color: #333;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .sim-link span {
            font-size: 0.8rem;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .github-footer {
            margin-top: 40px;
            font-size: 0.8rem;
        }

        .github-footer a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Physics Simulations</h1>
        <p>Select a simulation to begin</p>

        <div class="nav-links">
            <!-- Link to Simulation 2 -->
            <a href="faceRelationship.html" class="sim-link">
                Face Relationship 
                <span>Launch &rarr;</span>
            </a>

            <!-- Link to Simulation 3 -->
            <a href="sim3.html" class="sim-link">
                Simulation 3
                <span>Launch &rarr;</span>
            </a>
        </div>

        <div class="github-footer">
            Repository: <a href="https://github.com/mrchuakh/simulations">mrchuakh/simulations</a>
        </div>
    </div>

</body>
</html>
