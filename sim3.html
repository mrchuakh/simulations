<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourier Pulse Master</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #11171f;
            --border-color: #242d38;
            --text-main: #e0e0e0;
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title-group h1 { margin: 0; color: #b388ff; text-transform: uppercase; font-size: 24px; }
        .title-group p { margin: 5px 0; font-size: 10px; color: #7f8c8d; }

        .btn {
            background: var(--accent-green);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }

        .btn-reset { background: #34495e; color: white; }

        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }

        .panel-title { font-size: 12px; font-weight: bold; margin-bottom: 15px; color: #94a3b8; }

        .slider-container { margin: 20px 0; text-align: center; }
        input[type=range] { width: 100%; }

        .canvas-container {
            background: #080a0f;
            border: 1px solid #1a1f26;
            margin-top: 10px;
            position: relative;
        }

        canvas { display: block; width: 100%; }

        /* Components Grid */
        .components-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .mode-card {
            background: #0e1218;
            border: 1px solid #1e293b;
            padding: 8px;
            border-radius: 4px;
        }

        .mode-header { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; }

        /* Summation Panel */
        .summation-panel { grid-column: 1 / span 2; }
        .stats { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; color: #64748b; }
        .stats b { color: var(--accent-green); }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-group">
            <h1>Fourier Pulse Master</h1>
            <p>HARMONIC DECOMPOSITION • STANDING WAVE SIMULATION</p>
        </div>
        <div>
            <button class="btn" id="playBtn">▶ PLAY</button>
            <button class="btn btn-reset" id="resetBtn">↺</button>
        </div>
    </div>

    <div class="main-grid">
        <!-- Sidebar -->
        <div class="panel">
            <div class="panel-title">📉 ENVELOPE CONTROL</div>
            <p style="font-size: 11px; color: #64748b;">Adjust the peak position (5% to 95%).</p>
            
            <div class="slider-container">
                <input type="range" id="peakSlider" min="5" max="95" value="51">
                <div style="color: var(--accent-blue); font-size: 12px; margin-top:5px;">PEAK: <span id="peakVal">51</span>%</div>
            </div>

            <div class="panel-title" style="font-size: 10px;">TARGET STANDING WAVE ENVELOPE</div>
            <div class="canvas-container">
                <canvas id="envCanvas" height="120"></canvas>
            </div>
        </div>

        <!-- Components -->
        <div class="panel">
            <div class="panel-title">📚 COMPONENTS (T = 1/N)</div>
            <div class="components-grid" id="componentsGrid"></div>
        </div>

        <!-- Summation -->
        <div class="panel summation-panel">
            <div class="panel-title">⚗ SUMMATION</div>
            <div class="canvas-container">
                <canvas id="sumCanvas" height="250"></canvas>
            </div>
            <div class="stats">
                <span>ACTIVE HARMONICS: <b id="activeCount">10</b> / 10</span>
                <span>SIMULATION TIME: <b id="simTime">0.00</b>s</span>
            </div>
        </div>
    </div>

    <script>
        const config = {
            numModes: 10,
            colors: ['#3498db', '#e91e63', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#e67e22', '#d35400', '#ecf0f1', '#34495e']
        };

        let peakPos = 0.51; 
        let isPlaying = false;
        let time = 0;
        let coefficients = new Array(config.numModes).fill(0);
        let activeModes = new Array(config.numModes).fill(true);

        const peakSlider = document.getElementById('peakSlider');
        const peakValDisplay = document.getElementById('peakVal');
        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');
        const componentsGrid = document.getElementById('componentsGrid');
        
        const envCanvas = document.getElementById('envCanvas');
        const sumCanvas = document.getElementById('sumCanvas');

        // Setup Component Canvases
        for (let i = 0; i < config.numModes; i++) {
            const card = document.createElement('div');
            card.className = 'mode-card';
            card.innerHTML = `
                <div class="mode-header">
                    <span style="color:${config.colors[i]}">MODE ${i + 1}</span>
                    <span id="val-${i}" style="color:#555">0.000</span>
                </div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" checked id="chk-${i}">
                    <canvas id="modeCanvas-${i}" height="40" style="background:#05070a"></canvas>
                </div>
            `;
            componentsGrid.appendChild(card);
            document.getElementById(`chk-${i}`).onchange = (e) => {
                activeModes[i] = e.target.checked;
                document.getElementById('activeCount').innerText = activeModes.filter(v => v).length;
            };
        }

        function calculateFourier() {
            const L = 1.0;
            const p = peakPos;
            const h = 1.0;
            for (let n = 1; n <= config.numModes; n++) {
                // Fourier Sine Coefficient for Triangle Pulse
                const term = (2 * h * L * L) / (Math.pow(n * Math.PI, 2) * p * (L - p));
                const b_n = term * Math.sin(n * Math.PI * p / L);
                coefficients[n - 1] = b_n;
                document.getElementById(`val-${n-1}`).innerText = b_n.toFixed(3);
            }
        }

        function drawPath(ctx, width, height, color, func, lineWidth = 2) {
            ctx.clearRect(0, 0, width, height);
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            
            for (let i = 0; i <= width; i++) {
                const x = i / width;
                const y = func(x);
                // Map y (-1 to 1) to canvas coordinates
                const canvasY = (height / 2) - (y * height * 0.4);
                if (i === 0) ctx.moveTo(i, canvasY);
                else ctx.lineTo(i, canvasY);
            }
            ctx.stroke();
        }

        function animate() {
            if (isPlaying) {
                time += 0.03;
                document.getElementById('simTime').innerText = time.toFixed(2);
            }

            // 1. Draw Static Target Envelope
            drawPath(envCanvas.getContext('2d'), envCanvas.width, envCanvas.height, '#3498db', (x) => {
                if (x <= peakPos) return x / peakPos;
                return (1 - x) / (1 - peakPos);
            });

            // 2. Draw Modes
            for (let i = 0; i < config.numModes; i++) {
                const n = i + 1;
                const canvas = document.getElementById(`modeCanvas-${i}`);
                const b_n = coefficients[i];
                
                drawPath(canvas.getContext('2d'), canvas.width, canvas.height, config.colors[i], (x) => {
                    // Standing wave: y(x,t) = b_n * sin(n*pi*x) * cos(omega*t)
                    // We multiply by 1.5 visually for small coefficients
                    return b_n * Math.sin(n * Math.PI * x) * Math.cos(n * time) * 1.5;
                }, 1.5);
            }

            // 3. Draw Summation
            drawPath(sumCanvas.getContext('2d'), sumCanvas.width, sumCanvas.height, '#2ecc71', (x) => {
                let sum = 0;
                for (let i = 0; i < config.numModes; i++) {
                    if (activeModes[i]) {
                        const n = i + 1;
                        sum += coefficients[i] * Math.sin(n * Math.PI * x) * Math.cos(n * time);
                    }
                }
                return sum;
            }, 3);

            requestAnimationFrame(animate);
        }

        // Setup Resizing for internal canvas resolution
        function initCanvases() {
            const all = document.querySelectorAll('canvas');
            all.forEach(c => c.width = c.offsetWidth);
        }

        peakSlider.oninput = (e) => {
            peakPos = e.target.value / 100;
            peakValDisplay.innerText = e.target.value;
            calculateFourier();
        };

        playBtn.onclick = () => {
            isPlaying = !isPlaying;
            playBtn.innerText = isPlaying ? "⏸ PAUSE" : "▶ PLAY";
        };

        resetBtn.onclick = () => {
            time = 0;
            isPlaying = false;
            playBtn.innerText = "▶ PLAY";
            peakSlider.value = 51;
            peakPos = 0.51;
            peakValDisplay.innerText = 51;
            document.getElementById('simTime').innerText = "0.00";
            activeModes.fill(true);
            for(let i=0; i<config.numModes; i++) document.getElementById(`chk-${i}`).checked = true;
            document.getElementById('activeCount').innerText = 10;
            calculateFourier();
        };

        window.onresize = initCanvases;
        initCanvases();
        calculateFourier();
        animate();
    </script>
</body>
</html>
